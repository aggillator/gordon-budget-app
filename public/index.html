<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ledger — Budget Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
  <header class="masthead">
    <div>
      <p class="eyebrow">Household ledger</p>
      <h1 id="monthLabel">Loading…</h1>
    </div>
    <div class="masthead-actions">
      <select id="monthPicker"></select>
      <select id="categoryFilter"></select>
      <button id="clearFilterBtn" class="btn btn-quiet" hidden>× Clear filter</button>
      <button id="syncBtn" class="btn btn-quiet">Sync transactions</button>
      <button id="aiCategorizeBtn" class="btn btn-quiet">Categorize with AI</button>
      <button id="connectBtn" class="btn btn-primary">Connect a bank</button>
    </div>
  </header>

  <main>
    <section class="summary" id="summarySection">
      <h2>Budget vs. actual</h2>
      <div id="summaryList" class="ledger-rows"></div>
    </section>

    <section class="transactions">
      <div class="section-header">
        <h2>Transactions</h2>
        <input type="text" id="searchBox" placeholder="Search transactions..." class="search-box" />
      </div>
      <div id="txnList" class="ledger-rows"></div>
    </section>

    <section class="manage">
      <details>
        <summary>Manage categories</summary>
        <div id="categoryManageList" class="ledger-rows"></div>
        <form id="addCategoryForm" class="add-category-form">
          <input type="text" id="newCatName" placeholder="Category name" required />
          <input type="number" id="newCatBudget" placeholder="Monthly budget" step="0.01" min="0" />
          <label class="checkbox-label">
            <input type="checkbox" id="newCatExclude" />
            Not a budget category (income, Maaser, transfers, etc.)
          </label>
          <button type="submit" class="btn btn-quiet">Add category</button>
        </form>
      </details>
    </section>
  </main>

  <div id="statusBar" class="status-bar" hidden></div>

  <script src="app.js"></script>
</body>
</html>
